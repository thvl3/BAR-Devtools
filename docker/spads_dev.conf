# Minimal SPADS dev config for Docker-based local development

# Lobby connection parameters
lobbyHost:127.0.0.1
lobbyPort:8200
lobbyReconnectDelay:15
lobbyFollowRedirect:1
lobbyLogin:spadsbot
lobbyPassword:password

# Local network configuration
localLanIp:127.0.0.1
autoHostPort:54200
forceHostIp:

# SPADS files
etcDir:etc
varDir:var
instanceDir:spads_dev
logDir:log

# AutoUpdate
autoUpdateRelease:unstable
autoUpdateDelay:300
autoRestartForUpdate:whenEmpty

# Spring files
autoManagedSpringVersion:
autoManagedSpringDir:spring
unitsyncDir:/spring-engines/latest/
springServer:/spring-engines/latest/spring-dedicated
springServerType:dedicated
springDataDir:/spring-data
autoReloadArchivesMinDelay:30
autoLearnMaps:1
springConfig:

# Output flood protections
sendRecordPeriod:5
maxBytesSent:49000
maxLowPrioBytesSent:48000
maxChatMessageLength:32768
maxAutoHostMsgLength:240
promoteDelay:600

# Input flood protections
msgFloodAutoKick:15;7
statusFloodAutoKick:24;8
kickFloodAutoBan:5;120;5
cmdFloodAutoIgnore:8;8;4
reCallVoteDelay:30
floodImmuneLevel:100

# Logging system
lobbyInterfaceLogLevel:4
autoHostInterfaceLogLevel:4
updaterLogLevel:4
spadsLogLevel:4
simpleEventLogLevel:4
logChanChat:0
logChanJoinLeave:0
logBattleChat:1
logBattleJoinLeave:1
logGameChat:1
logGameJoinLeave:1
logGameServerMsg:1
logPvChat:1

# Alert system
alertLevel:130
alertDelay:6
alertDuration:72

# Lobby channels
masterChannel:autohosts
opOnMasterChannel:0
broadcastChannels:autohosts
promoteChannels:main
promoteMsg:%pplayer(s) needed for battle "%b" [%o, %a] (%u)

# Default preset
defaultPreset:team
restoreDefaultPresetDelay:30

# Vote system
voteTime:45
minVoteParticipation:50

# Plugins
pluginsDir:plugins
autoLoadPlugins:AutoRegister;BarManager;RatingManager

# Miscellaneous
autoLockClients:64
autoSaveBoxes:2
botsRank:3
springieEmulation:warn
dataDumpDelay:60
allowSettingsShortcut:1
colorSensitivity:55
kickBanDuration:300
privacyTrustLevel:130
maxSpecsImmuneLevel:100
userDataRetention:-1;-1;-1
useWin32Process:0
eventModel:auto
maxChildProcesses:32
registrationEmail:spads@spads.local

[team]
description:Team Game

# Rotation
rotationType:map;certified
rotationDelay:600
rotationEndGame:off|random|order
rotationEmpty:random|order|off
rotationManual:random|order

# Presets
preset:team|ffa|coop|duel
hostingPreset:default
battlePreset:team

# Maps
mapList:all
map:Comet Catcher Remake 1.8
autoLoadMapPreset:0|1
hideMapPresets:0|1
allowGhostMaps:0|1

# Automatic features
autoCallvote:1
autoLockRunningBattle:0|1
autoLock:off|on|advanced
autoSpecExtraPlayers:1|0
autoStart:on|off|advanced
autoStop:gameOver|noOpponent|onlySpec|off
autoBalance:advanced|on|off
autoFixColors:advanced|off|on
autoBlockBalance:1|0
autoBlockColors:0|1
balanceMode:clan;skill|skill|random
clanMode:tag(5);pref(5)|tag;pref(5)|tag|tag;pref|pref
idShareMode:off|auto|manual|clan|all
nbPlayerById:1|2-4
teamSize:6|1-8
nbTeams:2|1-5
extraBox:0|1
minPlayers:1
minTeamSize:1|2-4
autoAddBotNb:0|0-8
localBots:joe 0 E323AI;jim core#FF0000 KAIK
speedControl:2|1

# Bots and specs limits
maxBots:16|0-15
maxRemoteBots:16|0-15
maxLocalBots:16|0-15
allowedLocalAIs:E323AI;HughAI;KAIK;RAI
maxSpecs:|0-15
midGameSpecLevel:0
noSpecChat:0|1
noSpecDraw:0|1

# Default preferences
autoSetVoteMode:1
voteMode:normal
votePvMsgDelay:0
voteRingDelay:0
minRingDelay:20
handleSuggestions:0
rankMode:account
skillMode:TrueSkill
shareId:
ircColors:0
spoofProtection:warn

# Messages
welcomeMsg:Hi %u, welcome to DEV autohost %n.
welcomeMsgInGame:Hi %u, a game is in progress since %t.
mapLink:
ghostMapLink:
advertMsg:
advertDelay:0

# Miscellaneous
banList:empty
commandsFile:commands.conf
freeSettings:autoLock;teamSize(1-8)
allowModOptionsValues:1|0
allowMapOptionsValues:1|0
unlockSpecDelay:5;30
forwardLobbyToGame:1|0
endGameCommand:
endGameCommandEnv:
endGameCommandMsg:
endGameAwards:1|0|2

[ffa]
description:FFA Game
battlePreset:ffa
autoBalance:advanced|off|on
nbTeams:16

[coop]
description:Coop PvE Game
battlePreset:coop
autoBalance:off|advanced|on
nbTeams:1

[duel]
description:Duel 1v1 Game
battlePreset:duel
autoBalance:off|advanced|on
nbTeams:2
nbPlayerById:1
teamSize:1
noSpecChat:1
autoStart:off
